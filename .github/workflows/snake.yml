name: generate animation
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Workspace
        run: mkdir -p dist

      - name: Generate Contribution Animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            "dist/github-snake.svg"
            "dist/github-snake-dark.svg?color_snake=#00D9FF&color_dots=#0a192f,#00CED1,#00D9FF,#ffffff,#001f3f"
            "dist/pacman-contribution.svg?color_snake=#00D9FF&color_dots=#0a192f,#00CED1,#00D9FF,#ffffff,#001f3f&snake_type=pacman"

      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}