name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run on every push on the main branch
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # generates a snake game from a github user contributions graph, output a svg animation
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            "dist/github-snake.svg"
            "dist/github-snake-dark.svg?color_snake=#00D9FF&color_dots=#0a192f,#00CED1,#00D9FF,#ffffff,#001f3f"
            "dist/pacman-contribution.svg?color_snake=#00D9FF&color_dots=#0a192f,#00CED1,#00D9FF,#ffffff,#001f3f&color_empty=#0a192f&snake_type=pacman"

      # push the content of <build_dir> to the output branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}